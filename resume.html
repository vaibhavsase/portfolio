<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume | Vaishnavi Tekale</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background-color: #0f172a;
      color: white;
    }

    .header {
      background-color: #1e293b;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      margin-bottom: 10px;
      color: #00ffff;
      font-size: 2rem;
    }

    .header nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #ffffff;
      font-weight: bold;
    }

    .header nav a:hover {
      color: #00ffff;
    }

    .resume-container {
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }

    .resume-container iframe {
      width: 90%;
      height: 90vh;
      border: none;
      border-radius: 10px;
      box-shadow: 0 0 20px #00ffff66;
    }

    @media (max-width: 768px) {
      .resume-container iframe {
        width: 100%;
        height: 85vh;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>My Resume</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <div class="resume-container">
    <iframe src="resume.pdf"></iframe>
  </div>
</body>
</html>
